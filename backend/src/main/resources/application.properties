spring.application.name=residencial

# Datasource configuration (MS SQL Server)
spring.datasource.url=jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:residencial_db};encrypt=true;trustServerCertificate=true;
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:Password123!}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Server configuration
server.port=8080
