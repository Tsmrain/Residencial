version: '3.8'

services:
  db:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: residencial-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Residencial_Password123!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

  db-init:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: residencial-db-init
    depends_on:
      - db
    # Script mejorado: Reintenta cada 5 segundos hasta que la DB se cree
    command: >
      bash -c "
      echo 'Esperando a SQL Server...';
      until /opt/mssql-tools/bin/sqlcmd -S db -U sa -P 'Residencial_Password123!' -Q 'SELECT 1' &> /dev/null; do
        echo 'SQL Server no está listo aún, reintentando en 5s...';
        sleep 5;
      done;
      echo '¡SQL Server listo! Creando base de datos residencial_db...';
      /opt/mssql-tools/bin/sqlcmd -S db -U sa -P 'Residencial_Password123!' -Q \"IF NOT EXISTS (SELECT * FROM sys.databases WHERE name = 'residencial_db') BEGIN CREATE DATABASE residencial_db; END\";
      echo 'Proceso finalizado exitosamente.';"

volumes:
  sqlserver_data: