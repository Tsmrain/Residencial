services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: residencial-db
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Residencial_Password123!
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: residencial-db-init
    depends_on:
      - db
    volumes:
      - ./init.sql:/init.sql
    command: >
      bash -c "
      echo 'Esperando a que SQL Server inicie...';
      sleep 20;
      for i in {1..20}; do
        /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P Residencial_Password123! -C -i /init.sql;
        if [ \$? -eq 0 ]; then
          echo 'Base de datos residencial_db creada exitosamente.';
          break;
        else
          echo 'El servidor aún no está listo, reintentando en 5 segundos...';
          sleep 5;
        fi;
      done"

volumes:
  sqlserver_data:
